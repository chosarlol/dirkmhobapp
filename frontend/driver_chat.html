<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DirkMhob | Driver Chat</title>
  <style>
    :root{--primary:#1a73e8;--primary-dark:#1558c0;--success:#22c55e;--success-dark:#16a34a;--danger:#ef4444;--bg:#f0f2f5;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--sent-bg:#1a73e8;--recv-bg:#f1f5f9;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
    a{color:inherit;text-decoration:none;}

    /* ── HEADER ── */
    .site-header{background:var(--primary);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(26,115,232,.35);}
    .header-inner{display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:64px;}
    .brand{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
    .brand-mark{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;}
    .brand-name{font-weight:800;font-size:1.05rem;}
    .brand-sep{opacity:.4;margin:0 3px;}
    .portal-lbl{font-size:.85rem;opacity:.8;font-weight:600;}
    .header-spacer{flex:1;}
    .header-right{display:flex;align-items:center;gap:.75rem;flex-shrink:0;}
    .top-nav{display:flex;gap:2px;}
    .nav-link{padding:7px 14px;border-radius:8px;font-size:.85rem;font-weight:600;color:rgba(255,255,255,.72);transition:background .15s,color .15s;}
    .nav-link:hover{background:rgba(255,255,255,.12);color:#fff;}
    .nav-link.active{background:rgba(255,255,255,.22);color:#fff;}
    .user-chip{display:flex;align-items:center;gap:7px;font-size:.85rem;font-weight:600;}
    .avatar-sm{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;}
    .logout-btn{padding:7px 14px;border-radius:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:.82rem;font-weight:600;cursor:pointer;transition:background .15s;}
    .logout-btn:hover{background:rgba(255,255,255,.2);color:#fff;}

    /* ── LAYOUT ── */
    .page-body{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 64px);overflow:hidden;}

    /* ── LEFT: Conversation list ── */
    .conv-list{display:flex;flex-direction:column;background:#f8fafc;border-right:1px solid var(--border);overflow:hidden;}
    .conv-list-head{padding:1rem 1.1rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .conv-list-head h2{font-size:.95rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:.5rem;}
    .conv-list-head p{font-size:.78rem;color:var(--muted);margin-top:.25rem;}
    .conv-items{flex:1;overflow-y:auto;padding:.75rem;}

    .conv-card{display:flex;align-items:center;gap:.75rem;padding:.75rem .85rem;border-radius:12px;border:1px solid var(--border);background:var(--surface);margin-bottom:.55rem;cursor:pointer;transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
    .conv-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);border-color:#c7d7f5;}
    .conv-card.selected{border-left:3px solid var(--primary);background:#eff6ff;border-color:#93c5fd;}
    .conv-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#ff6b35,#e85d2a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.9rem;flex-shrink:0;}
    .conv-info{flex:1;min-width:0;}
    .conv-name{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv-sub{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem;}
    .conv-badge{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0;align-self:flex-start;margin-top:2px;}
    .badge-pickup{background:#fef3c7;color:#92400e;}
    .badge-onway {background:#dcfce7;color:#15803d;}

    .conv-empty{text-align:center;padding:2rem 1rem;color:#94a3b8;}
    .conv-empty .ico{font-size:2.5rem;margin-bottom:.5rem;}
    .conv-empty p{font-size:.85rem;}

    /* ── RIGHT: Chat panel ── */
    .chat-panel{display:flex;flex-direction:column;height:100%;background:var(--surface);}

    /* No conversation selected */
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:var(--muted);text-align:center;padding:2rem;}
    .chat-empty .big{font-size:4rem;opacity:.35;}
    .chat-empty h3{font-size:1.05rem;font-weight:700;color:#94a3b8;}
    .chat-empty p{font-size:.88rem;}

    /* Chat header */
    .chat-header{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
    .ch-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff6b35,#e85d2a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1rem;flex-shrink:0;}
    .ch-info .name{font-size:1rem;font-weight:800;}
    .ch-info .sub{font-size:.78rem;color:var(--muted);margin-top:.1rem;display:flex;align-items:center;gap:.35rem;}
    .online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;flex-shrink:0;}
    .ch-status{margin-left:auto;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;}
    .ch-status.preparing {background:#fef3c7;color:#92400e;}
    .ch-status.on_the_way{background:#dcfce7;color:#15803d;}
    .ch-status.delivered {background:#dbeafe;color:#1e40af;}

    /* Offline bar */
    .offline-bar{background:#fef3c7;border-bottom:1px solid #fde68a;padding:.45rem 1.25rem;font-size:.81rem;color:#92400e;font-weight:600;display:none;flex-shrink:0;}
    .offline-bar.show{display:block;}

    /* Messages area */
    .messages-area{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.55rem;scroll-behavior:smooth;}

    .msg-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;gap:.4rem;padding:2rem;}
    .msg-empty .ico{font-size:2.5rem;margin-bottom:.25rem;}
    .msg-empty h4{font-size:.95rem;font-weight:700;color:#94a3b8;}
    .msg-empty p{font-size:.83rem;}

    .msg-row{display:flex;flex-direction:column;max-width:65%;}
    .msg-row.sent    {align-self:flex-end;align-items:flex-end;}
    .msg-row.received{align-self:flex-start;align-items:flex-start;}
    .msg-sender{font-size:.71rem;font-weight:700;color:var(--muted);margin-bottom:.15rem;padding:0 .2rem;}
    .bubble{padding:.6rem .95rem;border-radius:18px;font-size:.92rem;line-height:1.45;word-break:break-word;}
    .sent .bubble    {background:var(--sent-bg);color:#fff;border-bottom-right-radius:4px;}
    .received .bubble{background:var(--recv-bg);color:var(--text);border-bottom-left-radius:4px;}
    .msg-time{font-size:.68rem;color:var(--muted);margin-top:.18rem;padding:0 .2rem;}
    .msg-time .tick{color:var(--primary);}

    /* Input bar */
    .input-bar{display:flex;align-items:flex-end;gap:.65rem;padding:.85rem 1.1rem;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
    .input-wrap{flex:1;display:flex;align-items:flex-end;gap:.5rem;background:#f1f5f9;border-radius:24px;padding:.55rem .85rem;border:1.5px solid transparent;transition:border-color .2s;}
    .input-wrap:focus-within{border-color:var(--primary);background:#fff;}
    .msg-input{flex:1;border:none;background:transparent;outline:none;font:inherit;font-size:.92rem;resize:none;min-height:22px;max-height:120px;color:var(--text);line-height:1.45;}
    .msg-input::placeholder{color:var(--muted);}
    .emoji-btn{font-size:1.1rem;cursor:pointer;opacity:.65;transition:opacity .15s;}
    .emoji-btn:hover{opacity:1;}
    .send-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,opacity .15s;}
    .send-btn:hover{transform:scale(1.07);}
    .send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
    .send-btn svg{pointer-events:none;}

    /* Responsive */
    @media(max-width:860px){.page-body{grid-template-columns:1fr;}.conv-list{display:none;}}
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">DM</div>
      <span class="brand-name">DirkMhob</span>
      <span class="brand-sep">/</span>
      <span class="portal-lbl">Driver Portal</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-right">
      <nav class="top-nav">
        <a class="nav-link" href="driver_orders.html">📦 Orders</a>
        <a class="nav-link" href="driver_earning.html">💰 Earnings</a>
        <a class="nav-link active" href="driver_chat.html">💬 Chat</a>
        <a class="nav-link" href="driver_profile.html">👤 Profile</a>
      </nav>
      <div class="user-chip">
        <div class="avatar-sm" id="header-avatar">?</div>
        <span id="header-name">Driver</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
</header>

<!-- PAGE BODY -->
<div class="page-body">

  <!-- LEFT: Conversation list -->
  <aside class="conv-list">
    <div class="conv-list-head">
      <h2>💬 Conversations</h2>
      <p>Your active deliveries</p>
    </div>
    <div class="conv-items" id="conv-items">
      <div class="conv-empty">
        <div class="ico">📦</div>
        <p>Loading orders…</p>
      </div>
    </div>
  </aside>

  <!-- RIGHT: Chat panel -->
  <section class="chat-panel" id="chat-panel">
    <div class="chat-empty" id="chat-empty">
      <div class="big">💬</div>
      <h3>Select a conversation</h3>
      <p>Choose an active delivery on the left to chat with the customer.</p>
    </div>
  </section>

</div>

<script>
  var API = (location.port==='5500'||location.port==='5501')?'http://127.0.0.1:8000':location.origin;
  var myUserId   = null;
  var myName     = '';
  var activeRef  = '';       // currently open order_ref
  var lastMsgId  = 0;
  var msgTimer   = null;     // 3-second message poll
  var ordTimer   = null;     // 10-second order list refresh
  var orders     = [];       // latest active orders from backend

  var EMOJIS = ['😊','👍','🙏','🛵','🍔','😂','❤️','👋','✅','🔥'];
  var emojiIdx = 0;

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function initials(name){ return (name||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2)||'?'; }

  // ── Auth guard ────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    fetch(API + '/api/me/', { credentials: 'include' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (!d.is_authenticated || d.role !== 'driver') {
          window.location.href = 'driver_login.html';
          return;
        }
        myUserId = d.id || (d.user && d.user.id) || null;
        myName   = d.name || d.username || 'Driver';

        var ini = initials(myName);
        document.getElementById('header-avatar').textContent = ini;
        document.getElementById('header-name').textContent   = myName;

        // Load orders, then check for ?order_ref= in URL
        loadOrders(function() {
          var params = new URLSearchParams(window.location.search);
          var ref = params.get('order_ref');
          if (ref) openChat(ref);
        });

        ordTimer = setInterval(function(){ loadOrders(null); }, 10000);
      })
      .catch(function(){ window.location.href = 'driver_login.html'; });
  });

  // ── Load active orders ────────────────────────────────────────
  function loadOrders(cb) {
    fetch(API + '/api/driver/orders/', { credentials: 'include' })
      .then(function(r){
        if (r.status === 401) { window.location.href = 'driver_login.html'; return null; }
        return r.json();
      })
      .then(function(d){
        if (!d) return;
        orders = d.active_orders || [];
        renderConvList();
        if (cb) cb();
      })
      .catch(function(){});
  }

  // ── Render conversation list ──────────────────────────────────
  function renderConvList() {
    var el = document.getElementById('conv-items');
    if (!orders.length) {
      el.innerHTML = '<div class="conv-empty"><div class="ico">📦</div><p>No active deliveries right now.<br>Accept an order to start chatting.</p></div>';
      return;
    }
    el.innerHTML = orders.map(function(o) {
      var isSelected = (o.order_ref === activeRef);
      var badge = (o.status === 'on_the_way' || o.status === 'delivering')
        ? '<span class="conv-badge badge-onway">On the Way</span>'
        : '<span class="conv-badge badge-pickup">Picking Up</span>';
      var custInitials = initials(o.customer_name || 'C');
      return '<div class="conv-card' + (isSelected ? ' selected' : '') + '" onclick="openChat(\'' + esc(o.order_ref) + '\')">' +
        '<div class="conv-avatar">' + esc(custInitials) + '</div>' +
        '<div class="conv-info">' +
          '<div class="conv-name">' + esc(o.customer_name || 'Customer') + '</div>' +
          '<div class="conv-sub">🍴 ' + esc(o.restaurant_name) + ' &nbsp;·&nbsp; ' + esc(o.order_ref) + '</div>' +
        '</div>' +
        badge +
      '</div>';
    }).join('');
  }

  // ── Open a chat ───────────────────────────────────────────────
  function openChat(ref) {
    // Stop previous message poll
    if (msgTimer) { clearInterval(msgTimer); msgTimer = null; }

    activeRef = ref;
    lastMsgId = 0;
    renderConvList(); // highlight selected card

    // Find the order object
    var order = null;
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].order_ref === ref) { order = orders[i]; break; }
    }

    buildChatPanel(order);
    loadMessages(true);
    msgTimer = setInterval(function(){ loadMessages(false); }, 3000);
  }

  // ── Build the right-panel chat UI ────────────────────────────
  function buildChatPanel(order) {
    var custName = (order && order.customer_name) || 'Customer';
    var restName = (order && order.restaurant_name) || '—';
    var addr     = (order && order.delivery_address) || '—';
    var status   = (order && order.status) || '';
    var custIni  = initials(custName);

    var statusLabel = {
      preparing:  'Picking Up',
      on_the_way: 'On the Way',
      delivering: 'On the Way',
      delivered:  'Delivered',
    }[status] || status;

    document.getElementById('chat-panel').innerHTML =
      '<div class="offline-bar" id="offline-bar">⚠️ Connection lost — trying to reconnect…</div>' +
      '<header class="chat-header">' +
        '<div class="ch-avatar" id="ch-avatar">' + esc(custIni) + '</div>' +
        '<div class="ch-info">' +
          '<div class="name" id="ch-name">' + esc(custName) + '</div>' +
          '<div class="sub"><span class="online-dot" id="online-dot"></span><span id="ch-sub">📍 ' + esc(addr) + '</span></div>' +
        '</div>' +
        '<span class="ch-status ' + esc(status) + '" id="ch-status">' + esc(statusLabel) + '</span>' +
      '</header>' +
      '<div class="messages-area" id="messages-area">' +
        '<div class="msg-empty" id="msg-empty">' +
          '<div class="ico">💬</div>' +
          '<h4>No messages yet</h4>' +
          '<p>Say hello to ' + esc(custName) + '!</p>' +
        '</div>' +
      '</div>' +
      '<div class="input-bar">' +
        '<div class="input-wrap">' +
          '<textarea class="msg-input" id="msg-input" placeholder="Message ' + esc(custName) + '…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>' +
          '<span class="emoji-btn" onclick="insertEmoji()">😊</span>' +
        '</div>' +
        '<button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">' +
          '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
        '</button>' +
      '</div>';
  }

  // ── Load / poll messages ──────────────────────────────────────
  function loadMessages(isInit) {
    if (!activeRef) return;
    var url = API + '/api/chat/' + activeRef + '/' + (lastMsgId ? '?since_id=' + lastMsgId : '');
    fetch(url, { credentials: 'include' })
      .then(function(r){
        if (r.status === 401) { window.location.href = 'driver_login.html'; return null; }
        var bar = document.getElementById('offline-bar');
        var dot = document.getElementById('online-dot');
        if (bar) bar.classList.remove('show');
        if (dot) dot.style.background = '#22c55e';
        return r.json();
      })
      .then(function(d){
        if (!d || d.error) return;

        // Sync customer name + status if returned
        if (d.customer_name) {
          var nameEl = document.getElementById('ch-name');
          var iniEl  = document.getElementById('ch-avatar');
          if (nameEl) nameEl.textContent = d.customer_name;
          if (iniEl)  iniEl.textContent  = initials(d.customer_name);
        }
        if (d.status) {
          var stEl = document.getElementById('ch-status');
          if (stEl) {
            var lbl = {preparing:'Picking Up',on_the_way:'On the Way',delivering:'On the Way',delivered:'Delivered'}[d.status] || d.status;
            stEl.textContent  = lbl;
            stEl.className    = 'ch-status ' + d.status;
          }
        }

        if (d.messages && d.messages.length) {
          renderMessages(d.messages, isInit);
        }
      })
      .catch(function(){
        var bar = document.getElementById('offline-bar');
        var dot = document.getElementById('online-dot');
        if (bar) bar.classList.add('show');
        if (dot) dot.style.background = '#f59e0b';
      });
  }

  // ── Render messages ───────────────────────────────────────────
  function renderMessages(msgs, scrollBottom) {
    var area  = document.getElementById('messages-area');
    var empty = document.getElementById('msg-empty');
    if (!area) return;
    if (empty) empty.remove();

    var frag = document.createDocumentFragment();
    msgs.forEach(function(m) {
      if (m.id <= lastMsgId) return;
      lastMsgId = Math.max(lastMsgId, m.id);

      var isMine = (myUserId !== null && m.sender_id === myUserId);
      var row    = document.createElement('div');
      row.className = 'msg-row ' + (isMine ? 'sent' : 'received');

      var sender = document.createElement('div');
      sender.className = 'msg-sender';
      sender.textContent = isMine ? 'You' : m.sender_name;

      var bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = m.body;

      var time = document.createElement('div');
      time.className = 'msg-time';
      time.innerHTML = m.created_at + (isMine ? ' <span class="tick">✓✓</span>' : '');

      row.appendChild(sender);
      row.appendChild(bubble);
      row.appendChild(time);
      frag.appendChild(row);
    });

    area.appendChild(frag);
    if (scrollBottom || isNearBottom(area)) area.scrollTop = area.scrollHeight;
  }

  function isNearBottom(el) { return el.scrollHeight - el.scrollTop - el.clientHeight < 80; }

  // ── Send message ──────────────────────────────────────────────
  function sendMessage() {
    var input = document.getElementById('msg-input');
    var btn   = document.getElementById('send-btn');
    if (!input || !activeRef) return;
    var body = input.value.trim();
    if (!body) return;

    btn.disabled = true;
    input.value  = '';
    input.style.height = 'auto';

    fetch(API + '/api/chat/' + activeRef + '/', {
      method:      'POST',
      credentials: 'include',
      headers:     { 'Content-Type': 'application/json' },
      body:        JSON.stringify({ body: body }),
    })
    .then(function(r){ return r.json(); })
    .then(function(m){ if (m.id) renderMessages([m], true); })
    .catch(function(){})
    .finally(function(){ if (btn) btn.disabled = false; if (input) input.focus(); });
  }

  // ── Input helpers ─────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
  function insertEmoji() {
    var input = document.getElementById('msg-input');
    if (!input) return;
    input.value += EMOJIS[emojiIdx % EMOJIS.length];
    emojiIdx++;
    input.focus();
  }

  // ── Logout ────────────────────────────────────────────────────
  function doLogout() {
    fetch(API + '/api/logout/', { method: 'POST', credentials: 'include' })
      .finally(function(){
        try { localStorage.removeItem('dirkmhob_user'); } catch(e) {}
        window.location.href = 'driver_login.html';
      });
  }
</script>
</body>
</html>
