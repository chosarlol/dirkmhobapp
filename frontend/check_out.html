<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <!-- Inter Font for modern UI typography -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Container Simulation */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            background-color: #fcfcfc;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* Top App Bar */
        .app-bar {
            background-color: #1e88e5;
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-bar h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Scrollable Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Item & Info Cards */
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.04);
            display: flex;
            gap: 16px;
            position: relative;
        }

        .card-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card-details {
            flex: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .item-name {
            font-size: 14px;
            font-weight: 700;
            color: #000;
        }

        .item-price {
            font-size: 14px;
            font-weight: 700;
            color: #000;
        }

        .item-description {
            font-size: 12px;
            color: #8e8e93;
            line-height: 1.4;
        }

        .add-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #1e88e5;
            background: none;
            color: #1e88e5;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        /* Delivery & Voucher Section */
        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.04);
            cursor: pointer;
        }

        .info-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #8e8e93;
        }

        .info-left.active {
            color: #2ec4b6;
            font-weight: 600;
        }

        .info-left svg {
            width: 20px;
            height: 20px;
        }

        .arrow-right {
            color: #8e8e93;
        }

        /* Summary Breakdown */
        .summary-section {
            padding: 0 4px;
            margin-top: 8px;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .summary-title {
            font-size: 14px;
            font-weight: 700;
            color: #000;
        }

        .delivery-time {
            font-size: 12px;
            font-weight: 700;
            color: #000;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8e8e93;
        }

        .summary-row.discount .value {
            color: #2ec4b6;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #000;
        }

        /* Bottom Action Button */
        .footer {
            padding: 16px;
            background-color: #fcfcfc;
        }

        .continue-btn {
            width: 100%;
            background-color: #4ea8de;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .continue-btn:hover {
            background-color: #1e88e5;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- App Header Bar -->
    <header class="app-bar">
        <button class="icon-btn">&#8592;</button>
        <h1>Checkout</h1>
        <button class="icon-btn">&#9998;</button>
    </header>

    <!-- Main Content Area -->
    <main class="content">
        <div id="checkout-items"></div>

        <!-- Delivery Address Selector -->
        <div class="info-row">
            <div class="info-left">
                <!-- User Avatar Icon -->
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                <span>Deliver to: Seng Kimhour</span>
            </div>
            <span class="arrow-right">&#8250;</span>
        </div>

        <!-- Voucher Applied Tag -->
        <div class="info-row">
            <div class="info-left active">
                <!-- Ticket Coupon Icon -->
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 8.5V6c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v2.5c0 .55.45 1 1 1a1.5 1.5 0 0 0 0 3c-.55 0-1 .45-1 1V18c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-2.5c0-.55-.45-1-1-1a1.5 1.5 0 0 0 0-3c.55 0 1-.45 1-1z"/></svg>
                <span>50% OFF Applied</span>
            </div>
            <span class="arrow-right">&#8250;</span>
        </div>

        <!-- Bill Breakdown Details -->
        <div class="summary-section">
            <div class="summary-header">
                <span class="summary-title">Checkout</span>
                <span class="delivery-time">20-30mins</span>
            </div>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal-value">$ 0.00</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee</span>
                <span id="delivery-value">$ 2.50</span>
            </div>
            <div class="summary-row discount">
                <span>Discount</span>
                <span id="discount-value" class="value">-$ 0.00</span>
            </div>
            <div class="total-row">
                <span>Total</span>
                <span id="total-value">$ 0.00</span>
            </div>
        </div>

    </main>

    <!-- Bottom Submission Area -->
<footer class="footer">
        <button class="continue-btn" type="button" onclick="continueToPayment()">Continue</button>
</footer>
</div>

<script>
    function loadCart() {
        const cartItemsStr = localStorage.getItem('cartItems');
        const cartTotalStr = localStorage.getItem('cartTotal');
        if (!cartItemsStr || !cartTotalStr) {
            window.location.href = 'cart_screen.html';
            return null;
        }
        return {
            items: JSON.parse(cartItemsStr),
            total: JSON.parse(cartTotalStr)
        };
    }

    function renderCheckoutItems() {
        const cart = loadCart();
        if (!cart) return;

        const container = document.getElementById('checkout-items');
        container.innerHTML = '';

        cart.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img class="card-img" src="https://placeholder.com" alt="${item.name}">
                <div class="card-details">
                    <div class="card-header">
                        <span class="item-name">${item.name}</span>
                        <span class="item-price">$ ${item.price.toFixed(2)}</span>
                    </div>
                    <p class="item-description">${item.restaurant} · Qty ${item.quantity}</p>
                </div>
            `;
            container.appendChild(card);
        });

        const subtotal = cart.total.totalUSD;
        const delivery = 2.5;
        const discount = Math.min(7.62, subtotal);
        const total = subtotal + delivery - discount;

        document.getElementById('subtotal-value').textContent = `$ ${subtotal.toFixed(2)}`;
        document.getElementById('delivery-value').textContent = `$ ${delivery.toFixed(2)}`;
        document.getElementById('discount-value').textContent = `-$ ${discount.toFixed(2)}`;
        document.getElementById('total-value').textContent = `$ ${total.toFixed(2)}`;
    }

    function continueToPayment() {
        const cart = loadCart();
        if (!cart) return;
        localStorage.setItem('checkoutInfo', JSON.stringify({
            items: cart.items,
            total: cart.total
        }));
        window.location.href = 'check_out2.html';
    }

    document.addEventListener('DOMContentLoaded', renderCheckoutItems);
</script>

</body>
</html>
