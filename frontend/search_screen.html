<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DirkMhob | Restaurants</title>
  <style>
    :root { --primary:#0077c8; --secondary:#ff6b35; --bg:#f8fafc; --surface:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; }
    body { background:var(--bg); color:var(--text); min-height:100vh; }
    a { color:inherit; text-decoration:none; }

    /* ── Navbar ── */
    .site-header { position:sticky; top:0; z-index:20; background:rgba(248,250,252,0.95); backdrop-filter:blur(12px); border-bottom:1px solid rgba(226,232,240,0.8); }
    .container { width:min(1240px, calc(100% - 2rem)); margin:0 auto; }
    .navbar { display:flex; justify-content:space-between; align-items:center; padding:1rem 0; gap:1rem; }
    .brand { display:flex; align-items:center; gap:0.75rem; font-weight:800; font-size:1.1rem; }
    .brand-mark { width:42px; height:42px; display:inline-flex; align-items:center; justify-content:center; border-radius:14px; color:white; background:linear-gradient(135deg,var(--primary),var(--secondary)); box-shadow:0 10px 25px rgba(0,119,200,0.25); font-size:1rem; font-weight:800; }
    .nav-links { display:flex; gap:1rem; color:var(--muted); font-weight:600; }
    .nav-links a:hover,.nav-links a.active { color:var(--primary); }
    .nav-actions { display:flex; align-items:center; gap:0.75rem; }
    .search-pill { display:flex; align-items:center; gap:0.6rem; background:#fff; border:1px solid var(--border); border-radius:999px; padding:0.55rem 0.9rem; min-width:220px; cursor:text; }
    .search-pill input { border:none; outline:none; width:100%; background:transparent; color:var(--text); font:inherit; font-size:0.9rem; }
    @media(max-width:760px){ .search-pill{ display:none; } }

    /* ── Category banner ── */
    .cat-banner { padding:2rem 0 0.5rem; }
    .cat-title { font-size:1.7rem; font-weight:800; margin-bottom:0.3rem; }
    .cat-sub { color:var(--muted); font-size:1rem; }

    /* ── Filter row ── */
    .filter-row { display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.25rem; margin:1.25rem 0; box-shadow:0 4px 20px rgba(15,23,42,0.05); }
    .filter-search { display:flex; align-items:center; gap:0.5rem; border:1px solid var(--border); border-radius:999px; padding:0.55rem 0.9rem; flex:1; min-width:140px; background:#f8fafc; }
    .filter-search input { border:none; outline:none; background:transparent; font:inherit; font-size:0.9rem; width:100%; }
    .filter-sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }

    /* Category chips */
    .chip-row { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .chip { padding:0.45rem 0.9rem; border-radius:999px; border:1.5px solid var(--border); background:var(--surface); font-size:0.88rem; font-weight:600; cursor:pointer; transition:all 0.15s; color:var(--muted); white-space:nowrap; }
    .chip:hover { border-color:var(--primary); color:var(--primary); }
    .chip.active { background:var(--primary); border-color:var(--primary); color:#fff; }

    /* ── Restaurant grid ── */
    .rest-grid { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:1.5rem; padding-bottom:3rem; }
    @media(max-width:900px){ .rest-grid{ grid-template-columns:repeat(2,1fr); } }
    @media(max-width:600px){ .rest-grid{ grid-template-columns:1fr; } }

    /* ── Restaurant card ── */
    .rest-card { background:var(--surface); border:1px solid var(--border); border-radius:22px; overflow:hidden; box-shadow:0 4px 20px rgba(15,23,42,0.06); transition:transform 0.2s,box-shadow 0.2s; display:flex; flex-direction:column; }
    .rest-card:hover { transform:translateY(-4px); box-shadow:0 16px 40px rgba(15,23,42,0.12); }
    .card-img { height:160px; display:flex; align-items:center; justify-content:center; font-size:4rem; position:relative; overflow:hidden; flex-shrink:0; }
    .card-img img { width:100%; height:100%; object-fit:cover; }
    .card-img .fallback-emoji { font-size:4rem; }
    .card-body { padding:1.1rem 1.1rem 1rem; flex:1; display:flex; flex-direction:column; gap:0.5rem; }
    .card-name { font-size:1.05rem; font-weight:800; color:var(--text); }
    .card-meta { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; font-size:0.85rem; color:var(--muted); }
    .card-meta .cuisine { color:var(--muted); }
    .card-meta .rating { color:#f59e0b; font-weight:700; }
    .card-meta .time,.card-meta .fee { display:flex; align-items:center; gap:0.25rem; }
    .card-meta .fee.free { color:#16a34a; font-weight:700; }
    .view-btn { display:block; text-align:center; background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; font-weight:700; font-size:0.95rem; padding:0.75rem; border-radius:12px; margin-top:auto; transition:opacity 0.15s; }
    .view-btn:hover { opacity:0.9; }

    /* ── Empty + loading states ── */
    .state-box { text-align:center; padding:4rem 1rem; color:var(--muted); }
    .state-box .icon { font-size:3.5rem; margin-bottom:1rem; }
    .state-box h3 { font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:0.4rem; }
    .state-box p { font-size:0.9rem; }

    @media(max-width:620px){ .nav-links{ display:none; } }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<header class="site-header">
  <div class="container navbar">
    <a class="brand" href="home_screen.html"><img src="logo.png" alt="DirkMhob" style="height:44px;width:auto;vertical-align:middle;"></a>
    <nav class="nav-links">
      <a href="home_screen.html">Home</a>
      <a href="search_screen.html" class="active">Restaurants</a>
      <a href="home_screen.html#categories">Categories</a>
      <a href="home_screen.html#promotions">Promotions</a>
      <a href="home_screen.html#contact">Contact</a>
    </nav>
    <div class="nav-actions">
      <label class="search-pill"><span>🔎</span><input type="text" id="nav-search" placeholder="Search restaurants…" oninput="onSearchInput(this.value)"></label>
      <span id="nav-auth"></span>
    </div>
  </div>
</header>

<!-- ── Main ── -->
<main class="container">

  <!-- Category title -->
  <div class="cat-banner">
    <div class="cat-title" id="page-title">All Restaurants</div>
    <div class="cat-sub" id="page-sub">Browse all available restaurants</div>
  </div>

  <!-- Category chips -->
  <div class="chip-row" id="chip-row">
    <span class="chip" data-cat="" onclick="selectChip(this, '')">All</span>
    <span class="chip" data-cat="Asian"     onclick="selectChip(this, 'Asian')">🥢 Asian</span>
    <span class="chip" data-cat="Khmer"     onclick="selectChip(this, 'Khmer')">🍜 Khmer</span>
    <span class="chip" data-cat="Coffee"    onclick="selectChip(this, 'Coffee')">☕ Coffee</span>
    <span class="chip" data-cat="Pastry"    onclick="selectChip(this, 'Pastry')">🥐 Pastry</span>
    <span class="chip" data-cat="Fast Food" onclick="selectChip(this, 'Fast Food')">🍔 Fast Food</span>
    <span class="chip" data-cat="Pizza"     onclick="selectChip(this, 'Pizza')">🍕 Pizza</span>
    <span class="chip" data-cat="Burgers"   onclick="selectChip(this, 'Burgers')">🍟 Burgers</span>
    <span class="chip" data-cat="Desserts"  onclick="selectChip(this, 'Desserts')">🍰 Desserts</span>
  </div>

  <!-- Search bar -->
  <div class="filter-row">
    <div class="filter-search">
      <span>🔎</span>
      <input type="text" id="search-input" placeholder="Search restaurants or cuisine…" oninput="onSearchInput(this.value)" />
    </div>
  </div>

  <!-- Grid -->
  <div class="rest-grid" id="rest-grid">
    <div class="state-box" style="grid-column:1/-1">
      <div class="icon">⏳</div>
      <h3>Loading restaurants…</h3>
    </div>
  </div>

</main>

<script src="auth.js"></script>
<script>
  var API = (location.port==='5500'||location.port==='5501')?'http://127.0.0.1:8000':location.origin;
  var allRestaurants = [];
  var activeCategory = '';
  var searchVal      = '';

  // ── Category → cuisine_type keyword matching ─────────────────────────
  var KEYWORDS = {
    'Asian':     ['asian','chinese','japanese','korean','thai','vietnamese','sushi','noodle','ramen','pho','dim sum','wok'],
    'Khmer':     ['khmer','cambodian','lok lak','amok','kuy teav'],
    'Coffee':    ['coffee','cafe','café','espresso','latte','brew','mocha'],
    'Pastry':    ['pastry','bakery','baked','croissant','patisserie','bread'],
    'Fast Food': ['fast food','fast-food','chicken','fried','burger','kfc','mcdonalds','quick bite','tex','wing'],
    'Pizza':     ['pizza','pizzeria','italian'],
    'Burgers':   ['burger','burgers','grill','bbq','barbeque','smash'],
    'Desserts':  ['dessert','sweet','ice cream','cake','gelato','waffle','crepe'],
  };

  // ── Restaurant → static page URL mapping ────────────────────────────
  var PAGE_MAP = {
    'brown - tk avenue': 'res_brown.html',
    'brown':             'res_brown.html',
    'texas chicken':     'res_texas.html',
    'texas':             'res_texas.html',
    'kfc - tk avenue':   'res_kfc.html',
    'kfc':               'res_kfc.html',
  };

  function getRestaurantPage(r) {
    var key = r.name.toLowerCase().trim();
    if (PAGE_MAP[key]) return PAGE_MAP[key];
    // partial match
    for (var k in PAGE_MAP) {
      if (key.indexOf(k) !== -1 || k.indexOf(key) !== -1) return PAGE_MAP[k];
    }
    return 'restaurant.html?id=' + r.id;
  }

  function matchesCategory(r, cat) {
    if (!cat) return true;
    var ct = (r.cuisine_type || '').toLowerCase();
    var nm = (r.name || '').toLowerCase();
    var kws = KEYWORDS[cat] || [cat.toLowerCase()];
    return kws.some(function(kw) { return ct.indexOf(kw) !== -1 || nm.indexOf(kw) !== -1; });
  }

  // ── Card background colour per category ─────────────────────────────
  var BG_MAP = {
    'coffee':['#fff7ed','#fde68a'],'pastry':['#fef3c7','#fed7aa'],
    'fast food':['#fee2e2','#fecaca'],'kfc':['#fee2e2','#fecaca'],
    'pizza':['#fef9c3','#fde68a'],'burger':['#fffbeb','#fde68a'],
    'khmer':['#f0fdf4','#bbf7d0'],'asian':['#eff6ff','#bfdbfe'],
    'dessert':['#fdf4ff','#f5d0fe'],'default':['#f1f5f9','#e2e8f0'],
  };

  function cardBg(r) {
    var ct = (r.cuisine_type || '').toLowerCase();
    for (var k in BG_MAP) {
      if (ct.indexOf(k) !== -1) return BG_MAP[k];
    }
    return BG_MAP['default'];
  }

  // ── Render ────────────────────────────────────────────────────────────
  function render() {
    var grid = document.getElementById('rest-grid');
    var q    = searchVal.toLowerCase();
    var filtered = allRestaurants.filter(function(r) {
      if (!matchesCategory(r, activeCategory)) return false;
      if (q && r.name.toLowerCase().indexOf(q) === -1 &&
               (r.cuisine_type || '').toLowerCase().indexOf(q) === -1) return false;
      return true;
    });

    if (!filtered.length) {
      var label = activeCategory || 'restaurants';
      grid.innerHTML =
        '<div class="state-box" style="grid-column:1/-1">' +
        '<div class="icon">🍽️</div>' +
        '<h3>No ' + label + ' restaurants found</h3>' +
        '<p>Try a different category or search term.</p>' +
        '</div>';
      return;
    }

    grid.innerHTML = filtered.map(function(r) {
      var colors = cardBg(r);
      var imgHtml = r.logo_image_url
        ? '<img src="' + r.logo_image_url + '" alt="' + esc(r.name) + '" />'
        : '<span class="fallback-emoji">' + (r.logo_emoji || '🍽️') + '</span>';
      var fee = parseFloat(r.delivery_fee) === 0 ? '<span class="fee free">🚚 Free</span>' : '<span class="fee">🚚 $' + Number(r.delivery_fee).toFixed(2) + '</span>';
      var page = getRestaurantPage(r);
      return '<div class="rest-card" onclick="window.location.href=\'' + page + '\'">' +
        '<div class="card-img" style="background:linear-gradient(135deg,' + colors[0] + ',' + colors[1] + ')">' + imgHtml + '</div>' +
        '<div class="card-body">' +
          '<div class="card-name">' + esc(r.name) + '</div>' +
          '<div class="card-meta">' +
            '<span class="cuisine">' + esc(r.cuisine_type || 'Restaurant') + '</span>' +
            '<span>·</span>' +
            '<span class="rating">⭐ ' + Number(r.rating || 4.5).toFixed(1) + '</span>' +
            '<span>·</span>' +
            '<span class="time">🕐 20–30 min</span>' +
            '<span>·</span>' +
            fee +
          '</div>' +
          '<a class="view-btn" href="' + page + '">View Menu</a>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Chip select ───────────────────────────────────────────────────────
  function selectChip(el, cat) {
    activeCategory = cat;
    document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
    el.classList.add('active');
    updateBanner();
    render();
    // Update URL without reloading
    var url = cat ? ('search_screen.html?category=' + encodeURIComponent(cat)) : 'search_screen.html';
    history.replaceState(null, '', url);
  }

  function onSearchInput(val) {
    searchVal = val;
    document.getElementById('nav-search').value = val;
    document.getElementById('search-input').value = val;
    render();
  }

  function updateBanner() {
    var titleEl = document.getElementById('page-title');
    var subEl   = document.getElementById('page-sub');
    var ICONS   = { 'Asian':'🥢','Khmer':'🍜','Coffee':'☕','Pastry':'🥐','Fast Food':'🍔','Pizza':'🍕','Burgers':'🍟','Desserts':'🍰' };
    if (activeCategory) {
      titleEl.textContent = (ICONS[activeCategory] || '') + ' ' + activeCategory + ' Restaurants';
      subEl.textContent   = 'Showing all ' + activeCategory.toLowerCase() + ' places near you';
    } else {
      titleEl.textContent = 'All Restaurants';
      subEl.textContent   = 'Browse all available restaurants';
    }
  }

  // ── Init: read URL param → activate chip → fetch ─────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(window.location.search);
    activeCategory = params.get('category') || '';

    // Activate the matching chip
    document.querySelectorAll('.chip').forEach(function(c) {
      if (c.dataset.cat === activeCategory) c.classList.add('active');
    });
    // Default "All" chip when no category
    if (!activeCategory) document.querySelector('.chip[data-cat=""]').classList.add('active');

    updateBanner();

    // Fetch from backend
    fetch(API + '/api/restaurants/', { credentials: 'include' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        allRestaurants = d.restaurants || [];
        render();
      })
      .catch(function(){
        document.getElementById('rest-grid').innerHTML =
          '<div class="state-box" style="grid-column:1/-1">' +
          '<div class="icon">⚠️</div>' +
          '<h3>Could not load restaurants</h3>' +
          '<p>Server is waking up — please refresh the page in a moment.</p>' +
          '</div>';
      });
  });
</script>
</body>
</html>
