<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirkMhob - Profile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f6f9;
        }

        /* --- THE CHOSEN PHONE FRAME --- */
        .phone-frame {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            position: relative;
            background-color: #f8fafc;
            overflow: hidden;
            border-radius: 32px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
        }

        /* --- TOP HEADER NAVIGATION --- */
        .header-section {
            background-color: #f8fafc;
            padding: 24px 24px 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            color: #000000;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .settings-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }

        /* --- SCROLLABLE MAIN STREAM CONTENT --- */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 85px 20px;
        }

        .scrollable-content::-webkit-scrollbar {
            display: none;
        }

        /* --- USER IDENTITY CARD --- */
        .profile-card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
            margin-bottom: 24px;
            border: 1px solid rgba(15, 23, 42, 0.03);
        }

        .user-info-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .avatar-img-placeholder {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #cbd5e1; /* Default gray canvas base */
            margin-right: 16px;
            border: 1px solid #e2e8f0;
        }

        .user-name-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #000000;
            flex: 1;
            letter-spacing: -0.3px;
        }

        .btn-edit {
            background-color: #7ec4f2; /* Sky blue tone matching mockup */
            color: #ffffff;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Divider line inside card */
        .card-divider {
            height: 1px;
            background-color: #e2e8f0;
            margin-bottom: 16px;
        }

        /* Stats Blocks Split Grid */
        .stats-row-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .stat-block {
            flex: 1;
            background-color: #f1f5f9;
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 500;
        }

        /* --- LIST CONTAINER CARDS --- */
        .menu-list-card {
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(15, 23, 42, 0.03);
        }

        /* Single Menu Item Structure */
        .menu-list-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            text-decoration: none;
            color: inherit;
            position: relative;
            cursor: pointer;
        }

        /* Separator borders between nested items */
        .menu-list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background-color: #f1f5f9;
        }

        .menu-item-icon {
            font-size: 1.4rem;
            margin-right: 16px;
            width: 24px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-item-text {
            flex: 1;
        }

        .menu-item-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 2px;
        }

        .menu-item-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 400;
        }

        .chevron-arrow {
            color: #cbd5e1;
            font-size: 1rem;
            font-weight: bold;
        }

        /* --- FIXED BOTTOM NAVIGATION BAR --- */
        .bottom-nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 68px;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            width: 25%;
            height: 100%;
            justify-content: center;
            text-decoration: none;
        }

        .nav-item.active {
            color: #0077c8;
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        
        <!-- SCREEN HEADER -->
        <header class="header-section">
            <h1 class="header-title">Profile</h1>
            <button class="settings-btn" aria-label="Settings configuration panel">⚙️</button>
        </header>

        <!-- MAIN SCROLLABLE STREAM CONTENT -->
        <div class="scrollable-content">
            
            <!-- USER ACCOUNT METRICS IDENTIFIER BOX -->
            <div class="profile-card">
                <div class="user-info-row">
                    <!-- REPLACE WITH YOUR PICTURE ASSET (e.g. src="user_avatar.jpg") -->
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='70' height='70' viewBox='0 0 70 70'><rect width='100%' height='100%' fill='%237ec4f2'/><circle cx='35' cy='35' r='20' fill='%23ffffff'/></svg>" alt="User Profile Image" class="avatar-img-placeholder">
                    
                    <div class="user-name-title">Seng Kimhour</div>
                    <button class="btn-edit">Edit</button>
                </div>
                
                <div class="card-divider"></div>
                
                <!-- Metrics Segment Grid Blocks Row -->
                <div class="stats-row-grid">
                    <div class="stat-block">
                        <div class="stat-number">67</div>
                        <div class="stat-label">Orders</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-number">8</div>
                        <div class="stat-label">Favorites</div>
                    </div>
                    <div class="stat-block">
                        <div class="stat-number">2</div>
                        <div class="stat-label">Vouchers</div>
                    </div>
                </div>
            </div>

            <!-- CORE CONFIGURATION MAIN LINK GROUP CARD -->
            <div class="menu-list-card">
                <a href="#" class="menu-list-item">
                    <span class="menu-item-icon">📋</span>
                    <div class="menu-item-text">
                        <div class="menu-item-title">My Orders</div>
                        <div class="menu-item-subtitle">View past & ongoing orders</div>
                    </div>
                    <span class="chevron-arrow">❯</span>
                </a>
                
                <a href="#" class="menu-list-item">
                    <span class="menu-item-icon">❤️</span>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Favorites</div>
                        <div class="menu-item-subtitle">See your saved dishes</div>
                    </div>
                    <span class="chevron-arrow">❯</span>
                </a>

                <a href="#" class="menu-list-item">
                    <span class="menu-item-icon">🎫</span>
                    <div class="menu-item-text">
                        <div class="menu-item-title">My Vouchers</div>
                        <div class="menu-item-subtitle">Check available discount</div>
                    </div>
                    <span class="chevron-arrow">❯</span>
                </a>

                <a href="#" class="menu-list-item">
                    <span class="menu-item-icon">💳</span>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Payment Methods</div>
                        <div class="menu-item-subtitle">Manage cards & wallets</div>
                    </div>
                    <span class="chevron-arrow">❯</span>
                </a>
            </div>

            <!-- SECONDARY CUSTOMER SERVICE ASSISTANCE ROW CARD -->
            <div class="menu-list-card">
                <a href="#" class="menu-list-item">
                    <span class="menu-item-icon">💬</span>
                    <div class="menu-item-text">
                        <div class="menu-item-title">Help & Support</div>
                        <div class="menu-item-subtitle">View past & ongoing orders</div>
                    </div>
                    <span class="chevron-arrow">❯</span>
                </a>
            </div>

        </div>

        <!-- FIXED FOOTER NAVIGATION PANEL BAR -->
        <nav class="bottom-nav-bar">
            <a href="home_screen.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="cart_screen.html" class="nav-item">
                <span class="nav-icon">🛒</span>
                <span>Cart</span>
            </a>
            <a href="search_screen.html" class="nav-item">
                <span class="nav-icon">🔍</span>
                <span>Search</span>
            </a>
            <a href="profile_screen.html" class="nav-item active">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>

    </div>

</body>
</html>
