<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirkMhob - Cart</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f6f9;
        }

        /* --- THE CHOSEN PHONE FRAME --- */
        .phone-frame {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
            border-radius: 32px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
        }

        /* --- TOP HEADER NAVIGATION --- */
        .header-section {
            background-color: #0077c8;
            padding: 18px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(0, 119, 200, 0.15);
        }

        .header-title {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        /* --- EMPTY STATE MAIN CONTAINER --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin-bottom: 68px; /* Room for the fixed footer bar */
        }

        /* Vector Empty Shopping Cart Drawing styling */
        .cart-icon-container {
            width: 160px;
            height: auto;
            margin-bottom: 16px;
            opacity: 0.25; /* Soft gray look matching your mockup */
        }

        .cart-icon-svg {
            width: 100%;
            height: auto;
        }

        .empty-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #cbd5e1; /* Subtle light gray title string label text */
            margin-bottom: 35px;
            letter-spacing: -0.5px;
        }

        /* --- ACTION BROWSE BUTTON --- */
        .btn-browse {
            width: 100%;
            max-width: 320px;
            padding: 16px 24px;
            background-color: #dbdbdb; /* Matching your solid block fill profile tint colors */
            color: #000000;
            border: none;
            border-radius: 20px; /* Pillow oval shape capsule treatment */
            font-size: 1.35rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .btn-browse:hover {
            background-color: #cecece;
        }

        .btn-browse:active {
            transform: scale(0.98);
        }

        /* --- FIXED BOTTOM NAVIGATION BAR --- */
        .bottom-nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 68px;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            width: 25%;
            height: 100%;
            justify-content: center;
            text-decoration: none;
        }

        .nav-item.active {
            color: #0077c8;
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        
        <!-- TOP APP BAR -->
        <header class="header-section">
            <h1 class="header-title">All Carts</h1>
        </header>

        <!-- EMPTY STATE MAIN BODY VIEW -->
        <main class="main-content">
            
            <!-- Modern optimized vector recreation of your mock shopping basket trolley icon -->
            <div class="cart-icon-container">
                <svg class="cart-icon-svg" viewBox="0 0 100 80" fill="none" xmlns="http://w3.org">
                    <!-- Trolley handle and top edge guide bar rails -->
                    <path d="M5 10h12l10 40h45l10-28H23" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- Lower chassis frame structures -->
                    <path d="M27 50l3 7h42" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
                    <!-- Wheel Hub Assemblies -->
                    <circle cx="34" cy="64" r="6" stroke="#475569" stroke-width="3" fill="#ffffff"/>
                    <circle cx="68" cy="64" r="6" stroke="#475569" stroke-width="3" fill="#ffffff"/>
                </svg>
            </div>

            <h2 class="empty-text">Empty Cart</h2>

            <!-- Action navigate trigger back to application catalog feed screen -->
            <button class="btn-browse" onclick="navigateTo('home.html')">Browse Restaurants</button>

        </main>

        <!-- FIXED BOTTOM FOOTER NAVIGATION BAR -->
        <nav class="bottom-nav-bar">
            <a href="home_screen.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="cart_screen.html" class="nav-item active">
                <span class="nav-icon">🛒</span>
                <span>Cart</span>
            </a>
            <a href="search_screen.html" class="nav-item" onclick="alert('Search view placeholder')">
                <span class="nav-icon">🔍</span>
                <span>Search</span>
            </a>
            <a href="profile_screen.html" class="nav-item" onclick="alert('Profile view placeholder')">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <!-- --- LINK ACTIONS NAVIGATION SCRIPT --- -->
    <script>
        function navigateTo(pageUrl) {
            // Relocates user workspace context back to your main category home.html layout file target securely
            window.location.href = pageUrl;
        }
    </script>
</body>
</html>
