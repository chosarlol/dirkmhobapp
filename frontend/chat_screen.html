<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — DirkMhob</title>
  <style>
    :root {
      --primary:#0077c8; --primary-dark:#005fa0; --secondary:#ff6b35;
      --bg:#f0f4f8; --surface:#fff; --border:#e2e8f0;
      --text:#0f172a; --muted:#64748b;
      --sent-bg:#0077c8; --recv-bg:#f1f5f9;
    }
    * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; }
    html, body { height:100%; background:var(--bg); color:var(--text); }

    /* ── Layout ── */
    .chat-layout {
      display:grid;
      grid-template-columns:320px 1fr;
      height:100vh;
      max-width:1200px;
      margin:0 auto;
      background:var(--surface);
      box-shadow:0 0 40px rgba(0,0,0,.12);
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
      background:#f8fafc;
    }

    .left-header {
      padding:1.25rem 1.25rem 1rem;
      border-bottom:1px solid var(--border);
    }
    .left-header a {
      display:inline-flex; align-items:center; gap:.5rem;
      color:var(--primary); font-weight:700; font-size:.9rem;
      text-decoration:none; margin-bottom:1rem;
    }
    .left-header a:hover { text-decoration:underline; }

    .brand { display:flex; align-items:center; gap:.6rem; font-weight:800; font-size:1.1rem; color:var(--text); }
    .brand-mark { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--secondary)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:.9rem; }

    .order-card {
      margin:.75rem;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:1rem;
    }
    .order-card .label { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:.2rem; }
    .order-card .ref   { font-size:.92rem; font-weight:800; color:var(--text); margin-bottom:.75rem; }
    .order-card .row   { display:flex; gap:.5rem; align-items:flex-start; font-size:.85rem; color:var(--muted); margin-bottom:.4rem; }
    .order-card .row .ico { flex-shrink:0; width:18px; }
    .status-badge { display:inline-block; margin-top:.6rem; padding:3px 10px; border-radius:999px; font-size:.75rem; font-weight:700; }
    .status-badge.preparing  { background:#fef3c7; color:#92400e; }
    .status-badge.on_the_way { background:#dcfce7; color:#15803d; }
    .status-badge.delivered  { background:#dbeafe; color:#1e40af; }
    .status-badge.confirmed  { background:#f0fdf4; color:#16a34a; }

    .participants {
      margin:.75rem;
      padding:.85rem 1rem;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
    }
    .participants h4 { font-size:.75rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:.65rem; }
    .participant { display:flex; align-items:center; gap:.7rem; margin-bottom:.6rem; }
    .participant:last-child { margin-bottom:0; }
    .avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:800; color:#fff; flex-shrink:0; }
    .avatar.driver   { background:linear-gradient(135deg,#0077c8,#005fa0); }
    .avatar.customer { background:linear-gradient(135deg,#ff6b35,#e85d2a); }
    .participant-info .name { font-size:.88rem; font-weight:700; }
    .participant-info .role { font-size:.75rem; color:var(--muted); }

    /* ── RIGHT PANEL ── */
    .right-panel {
      display:flex;
      flex-direction:column;
      height:100vh;
      background:#fff;
    }

    .chat-header {
      display:flex;
      align-items:center;
      gap:1rem;
      padding:.9rem 1.5rem;
      border-bottom:1px solid var(--border);
      background:#fff;
      flex-shrink:0;
    }
    .chat-header .avatar { width:44px; height:44px; font-size:1rem; }
    .chat-header-info .name { font-size:1rem; font-weight:800; }
    .chat-header-info .sub  { font-size:.8rem; color:var(--muted); display:flex; align-items:center; gap:.35rem; }
    .online-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; display:inline-block; }
    .chat-header-right { margin-left:auto; display:flex; gap:.5rem; }
    .icon-btn { width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:#f8fafc; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; transition:background .15s; }
    .icon-btn:hover { background:#e2e8f0; }

    /* ── Messages area ── */
    .messages-area {
      flex:1;
      overflow-y:auto;
      padding:1.5rem;
      display:flex;
      flex-direction:column;
      gap:.6rem;
      scroll-behavior:smooth;
    }

    .date-divider { text-align:center; font-size:.75rem; color:var(--muted); margin:.5rem 0; }

    .msg-row {
      display:flex;
      flex-direction:column;
      max-width:62%;
    }
    .msg-row.sent     { align-self:flex-end; align-items:flex-end; }
    .msg-row.received { align-self:flex-start; align-items:flex-start; }

    .msg-sender { font-size:.72rem; font-weight:700; color:var(--muted); margin-bottom:.18rem; padding:0 .25rem; }

    .bubble {
      padding:.65rem 1rem;
      border-radius:18px;
      font-size:.92rem;
      line-height:1.45;
      word-break:break-word;
    }
    .sent .bubble {
      background:var(--sent-bg);
      color:#fff;
      border-bottom-right-radius:4px;
    }
    .received .bubble {
      background:var(--recv-bg);
      color:var(--text);
      border-bottom-left-radius:4px;
    }
    .msg-time { font-size:.7rem; color:var(--muted); margin-top:.2rem; padding:0 .25rem; }
    .msg-time .tick { color:var(--primary); }

    /* typing indicator */
    .typing-row { display:flex; align-items:center; gap:.4rem; align-self:flex-start; padding:.3rem 0; }
    .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:blink 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay:.2s; }
    .typing-dot:nth-child(3) { animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2;} 40%{opacity:1;} }

    /* empty state */
    .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); text-align:center; gap:.5rem; }
    .empty-chat .emoji { font-size:3rem; margin-bottom:.5rem; }
    .empty-chat h3 { font-size:1rem; font-weight:700; color:var(--text); }
    .empty-chat p  { font-size:.88rem; }

    /* ── Input ── */
    .input-bar {
      display:flex;
      align-items:flex-end;
      gap:.75rem;
      padding:.9rem 1.25rem;
      border-top:1px solid var(--border);
      background:#fff;
      flex-shrink:0;
    }
    .input-wrap { flex:1; display:flex; align-items:flex-end; gap:.5rem; background:#f1f5f9; border-radius:24px; padding:.6rem .85rem; border:1.5px solid transparent; transition:border-color .2s; }
    .input-wrap:focus-within { border-color:var(--primary); background:#fff; }
    .msg-input { flex:1; border:none; background:transparent; outline:none; font:inherit; font-size:.93rem; resize:none; min-height:22px; max-height:120px; color:var(--text); line-height:1.45; }
    .msg-input::placeholder { color:var(--muted); }
    .emoji-btn { font-size:1.15rem; cursor:pointer; opacity:.7; transition:opacity .15s; flex-shrink:0; }
    .emoji-btn:hover { opacity:1; }
    .send-btn {
      width:44px; height:44px; border-radius:50%; border:none; cursor:pointer;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; flex-shrink:0; transition:transform .15s,opacity .15s;
    }
    .send-btn:hover { transform:scale(1.06); }
    .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    /* ── Offline notice ── */
    .offline-bar { background:#fef3c7; border-bottom:1px solid #fde68a; padding:.5rem 1.5rem; font-size:.82rem; color:#92400e; font-weight:600; display:none; }
    .offline-bar.show { display:block; }

    /* ── Responsive ── */
    @media(max-width:760px) {
      .chat-layout { grid-template-columns:1fr; }
      .left-panel { display:none; }
    }
  </style>
</head>
<body>

<div class="chat-layout">

  <!-- LEFT PANEL -->
  <aside class="left-panel">
    <div class="left-header">
      <div class="brand">
        <div class="brand-mark">DM</div>
        <span>DirkMhob</span>
      </div>
      <div style="margin-top:.75rem;font-size:.82rem;" id="back-link-wrap">
        <a href="order_comfirm.html" id="back-link" style="color:var(--primary);font-weight:700;text-decoration:none;">← Back</a>
      </div>
    </div>

    <!-- Order info card -->
    <div class="order-card" id="order-card">
      <div class="label">Order</div>
      <div class="ref" id="info-ref">Loading…</div>
      <div class="row"><span class="ico">🍴</span><span id="info-rest">—</span></div>
      <div class="row"><span class="ico">📍</span><span id="info-addr">—</span></div>
      <div id="info-status"></div>
    </div>

    <!-- Participants -->
    <div class="participants">
      <h4>Participants</h4>
      <div class="participant" id="part-driver" style="display:none">
        <div class="avatar driver" id="driver-avatar">?</div>
        <div class="participant-info">
          <div class="name" id="driver-name">Driver</div>
          <div class="role">🛵 Delivery Driver</div>
        </div>
      </div>
      <div class="participant" id="part-customer">
        <div class="avatar customer" id="customer-avatar">?</div>
        <div class="participant-info">
          <div class="name" id="customer-name">You</div>
          <div class="role">🛍️ Customer</div>
        </div>
      </div>
    </div>

    <div style="flex:1"></div>

    <div style="padding:.75rem; font-size:.78rem; color:var(--muted); text-align:center; border-top:1px solid var(--border);">
      Messages refresh every 3 seconds
    </div>
  </aside>

  <!-- RIGHT PANEL -->
  <section class="right-panel">

    <!-- Offline bar -->
    <div class="offline-bar" id="offline-bar">⚠️ Connection lost — trying to reconnect…</div>

    <!-- Chat header -->
    <header class="chat-header">
      <div class="avatar driver chat-header-av" id="header-avatar">?</div>
      <div class="chat-header-info">
        <div class="name" id="header-name">Loading…</div>
        <div class="sub"><span class="online-dot" id="online-dot"></span><span id="header-sub">Connecting…</span></div>
      </div>
      <div class="chat-header-right">
        <button class="icon-btn" title="Back" onclick="history.back()">←</button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages-area" id="messages-area">
      <div class="empty-chat" id="empty-state">
        <div class="emoji">💬</div>
        <h3>No messages yet</h3>
        <p id="empty-hint">Send the first message!</p>
      </div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="input-wrap">
        <textarea class="msg-input" id="msg-input" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <span class="emoji-btn" onclick="insertEmoji()">😊</span>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

  </section>
</div>

<script>
  var API = (location.port==='5500'||location.port==='5501')?'http://127.0.0.1:8000':location.origin;
  var orderRef   = '';
  var myUserId   = null;
  var myName     = '';
  var lastId     = 0;
  var pollTimer  = null;
  var isDriver   = false;
  var initDone   = false;

  var EMOJIS = ['😊','👍','🙏','🛵','🍔','😂','❤️','👋','✅','🔥'];
  var emojiIdx = 0;
  function insertEmoji() {
    var input = document.getElementById('msg-input');
    input.value += EMOJIS[emojiIdx % EMOJIS.length];
    emojiIdx++;
    input.focus();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function initials(name) {
    return (name || '?').split(' ').map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2) || '?';
  }

  // ── Init ───────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(window.location.search);
    orderRef = params.get('order_ref') || localStorage.getItem('last_order_ref') || '';

    if (!orderRef) {
      showError('No order reference found. Open this page from your order or driver dashboard.');
      return;
    }

    fetch(API + '/api/me/', { credentials: 'include' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (!d.is_authenticated) {
          // Redirect drivers to driver login, customers to customer login
          window.location.href = 'login.html';
          return;
        }
        myUserId = d.id || (d.user && d.user.id) || null;
        myName   = d.name || d.username || '';
        isDriver = (d.role === 'driver');

        // Point back link to the right page
        var backLink = document.getElementById('back-link');
        if (backLink) backLink.href = isDriver ? 'driver_orders.html' : 'order_comfirm.html';

        // Set MY side in the participants panel
        var myInitials = initials(myName);
        if (isDriver) {
          document.getElementById('driver-avatar').textContent = myInitials;
          document.getElementById('driver-name').textContent   = myName;
          document.getElementById('part-driver').style.display = 'flex';
          // Empty state hint for driver
          var hint = document.getElementById('empty-hint');
          if (hint) hint.textContent = 'Say hello to the customer!';
          // Input placeholder
          document.getElementById('msg-input').placeholder = 'Message customer…';
        } else {
          document.getElementById('customer-avatar').textContent = myInitials;
          document.getElementById('customer-name').textContent   = myName;
          // Empty state hint for customer
          var hint2 = document.getElementById('empty-hint');
          if (hint2) hint2.textContent = 'Start the conversation with your driver!';
          document.getElementById('msg-input').placeholder = 'Message driver…';
        }

        loadMessages(true);
        pollTimer = setInterval(poll, 3000);
      })
      .catch(function(){
        showError('Cannot connect to the server. Make sure Django is running.');
      });
  });

  // ── Load + Poll ────────────────────────────────────────────────
  function loadMessages(isInit) {
    var url = API + '/api/chat/' + orderRef + '/' + (lastId ? '?since_id=' + lastId : '');
    fetch(url, { credentials: 'include' })
      .then(function(r){
        if (r.status === 401) {
          window.location.href = isDriver ? 'driver_login.html' : 'login.html';
          return null;
        }
        document.getElementById('offline-bar').classList.remove('show');
        document.getElementById('online-dot').style.background = '#22c55e';
        document.getElementById('header-sub').textContent = isDriver ? 'Active delivery' : 'Your driver';
        return r.json();
      })
      .then(function(d){
        if (!d || d.error) return;

        if (isInit && !initDone) {
          initDone = true;
          // Order info card
          document.getElementById('info-ref').textContent  = '#' + orderRef;
          document.getElementById('info-rest').textContent = d.restaurant || '—';
          document.getElementById('info-addr').textContent = d.delivery_addr || '—';
          var badge = '<span class="status-badge ' + (d.status || '') + '">' + statusLabel(d.status) + '</span>';
          document.getElementById('info-status').innerHTML = badge;

          // Populate the OTHER side of the conversation
          if (isDriver) {
            // Driver is chatting with the customer
            var custName = d.customer_name || 'Customer';
            document.getElementById('customer-avatar').textContent = initials(custName);
            document.getElementById('customer-name').textContent   = custName;
            // Header shows customer
            document.getElementById('header-avatar').textContent   = initials(custName);
            document.getElementById('header-avatar').style.background = 'linear-gradient(135deg,#ff6b35,#e85d2a)';
            document.getElementById('header-name').textContent = custName;
          } else {
            // Customer is chatting with the driver
            var drvName = d.driver_name || 'Driver';
            document.getElementById('driver-avatar').textContent = initials(drvName);
            document.getElementById('driver-name').textContent   = drvName;
            document.getElementById('part-driver').style.display = 'flex';
            // Header shows driver
            document.getElementById('header-avatar').textContent = initials(drvName);
            document.getElementById('header-name').textContent   = drvName;
          }
        }

        // Update status badge on every poll (status can change)
        if (!isInit) {
          var badge2 = '<span class="status-badge ' + (d.status || '') + '">' + statusLabel(d.status) + '</span>';
          document.getElementById('info-status').innerHTML = badge2;
        }

        if (d.messages && d.messages.length) {
          renderMessages(d.messages, isInit);
        }
      })
      .catch(function(){
        document.getElementById('offline-bar').classList.add('show');
        document.getElementById('online-dot').style.background = '#f59e0b';
        document.getElementById('header-sub').textContent = 'Reconnecting…';
      });
  }

  function poll() { loadMessages(false); }

  // ── Render messages ────────────────────────────────────────────
  function renderMessages(msgs, scrollToBottom) {
    var area  = document.getElementById('messages-area');
    var empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    var frag = document.createDocumentFragment();
    msgs.forEach(function(m) {
      if (m.id <= lastId) return;
      lastId = Math.max(lastId, m.id);

      var isMine = (myUserId !== null && m.sender_id === myUserId);
      var row    = document.createElement('div');
      row.className = 'msg-row ' + (isMine ? 'sent' : 'received');

      var senderEl = document.createElement('div');
      senderEl.className = 'msg-sender';
      senderEl.textContent = isMine ? 'You' : m.sender_name;

      var bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = m.body;

      var timeEl = document.createElement('div');
      timeEl.className = 'msg-time';
      timeEl.innerHTML = m.created_at + (isMine ? ' <span class="tick">✓✓</span>' : '');

      row.appendChild(senderEl);
      row.appendChild(bubble);
      row.appendChild(timeEl);
      frag.appendChild(row);
    });

    area.appendChild(frag);
    if (scrollToBottom || isNearBottom(area)) {
      area.scrollTop = area.scrollHeight;
    }
  }

  function isNearBottom(el) {
    return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
  }

  // ── Send message ───────────────────────────────────────────────
  function sendMessage() {
    var input = document.getElementById('msg-input');
    var body  = input.value.trim();
    if (!body || !orderRef) return;

    var btn = document.getElementById('send-btn');
    btn.disabled = true;
    input.value  = '';
    input.style.height = 'auto';

    fetch(API + '/api/chat/' + orderRef + '/', {
      method:      'POST',
      credentials: 'include',
      headers:     { 'Content-Type': 'application/json' },
      body:        JSON.stringify({ body: body }),
    })
    .then(function(r){ return r.json(); })
    .then(function(m){
      if (m.id) renderMessages([m], true);
    })
    .catch(function(){})
    .finally(function(){ btn.disabled = false; input.focus(); });
  }

  // ── Helpers ────────────────────────────────────────────────────
  function statusLabel(s) {
    return ({
      confirmed:  'Confirmed',
      preparing:  'Driver Assigned',
      on_the_way: 'On the Way',
      delivering: 'On the Way',
      delivered:  'Delivered',
      cancelled:  'Cancelled',
    })[s] || s || '—';
  }

  function showError(msg) {
    document.getElementById('messages-area').innerHTML =
      '<div class="empty-chat"><div class="emoji">⚠️</div><h3>Cannot load chat</h3><p>' + msg + '</p></div>';
    document.getElementById('header-name').textContent = 'Chat Unavailable';
    document.getElementById('header-sub').textContent  = '';
  }
</script>
</body>
</html>
