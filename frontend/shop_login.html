<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DirkMhob | Shop Owner Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#0077c8;--primary-dark:#005fa0;--secondary:#ff6b35;--bg:#f1f5f9;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--danger:#dc2626;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f0f7ff,#e8f4fd);min-height:100vh;display:flex;flex-direction:column;}
    a{color:inherit;text-decoration:none;}

    /* ── NAV ── */
    nav{background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.9rem 1.5rem;display:flex;align-items:center;gap:10px;}
    .brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:0.88rem;}
    .brand-name{font-weight:800;font-size:1rem;color:var(--text);}
    .brand-sep{color:var(--muted);margin:0 4px;}

    /* ── CARD ── */
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{background:var(--surface);border-radius:24px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,119,200,0.12);border:1px solid var(--border);}
    .icon{font-size:2.5rem;text-align:center;margin-bottom:1rem;}
    .card h2{font-size:1.35rem;font-weight:800;text-align:center;margin-bottom:0.3rem;}
    .card .sub{text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:1.75rem;}
    .field{margin-bottom:1rem;}
    .field label{display:block;font-size:0.82rem;font-weight:700;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.04em;}
    .field input{width:100%;padding:0.8rem 1rem;border:1.5px solid var(--border);border-radius:12px;font:inherit;font-size:0.95rem;outline:none;transition:border-color 0.2s;background:#fafcff;}
    .field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,119,200,0.1);}
    .err{color:var(--danger);font-size:0.88rem;margin-bottom:0.85rem;padding:0.65rem 0.9rem;background:#fff0f0;border-radius:10px;border-left:3px solid var(--danger);display:none;}
    .btn{width:100%;padding:0.9rem;background:var(--primary);color:#fff;border:none;border-radius:12px;font:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:0.25rem;}
    .btn:hover{background:var(--primary-dark);}
    .links{margin-top:1.25rem;text-align:center;font-size:0.88rem;color:var(--muted);display:flex;flex-direction:column;gap:0.5rem;}
    .links a{color:var(--primary);font-weight:700;}

    /* access-denied banner */
    .denied{background:#fff0f0;border:1.5px solid #fecaca;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:none;color:var(--danger);font-weight:600;font-size:0.9rem;text-align:center;}
  </style>
</head>
<body>

  <nav>
    <img src="logo.png" alt="DirkMhob" style="height:36px;width:auto;vertical-align:middle;">
    
    <span class="brand-sep">/</span>
    <span style="font-size:0.88rem;color:var(--muted);font-weight:600;">Shop Owner Portal</span>
    <a href="home_screen.html" style="margin-left:auto;font-size:0.85rem;color:var(--muted);font-weight:600;">← Back to home</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="icon">🏪</div>
      <h2>Shop Owner Login</h2>
      <p class="sub">Manage your restaurant and menu from here.</p>

      <div class="denied" id="denied-msg">
        Access denied. This portal is for shop owners only.
      </div>
      <div class="err" id="login-err"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="shopowner" autocomplete="username"
               onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')doLogin()" />
      </div>

      <button class="btn" onclick="doLogin()">Sign in →</button>

      <div class="links">
        <span>New shop? <a href="shop_dashboard.html#register">Register your restaurant</a></span>
        <span>Customer or admin? <a href="login.html">Go to main login</a></span>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    var API = (location.port==='5500'||location.port==='5501')?'http://127.0.0.1:8000':location.origin;

    /* Check URL hash for #denied (redirected from shop_dashboard) */
    if (window.location.hash === '#denied') {
      document.getElementById('denied-msg').style.display = 'block';
    }

    /* Fix 7 — Shop-owner-only login */
    function doLogin() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var errEl    = document.getElementById('login-err');
      errEl.style.display = 'none';

      if (!username || !password) {
        errEl.textContent   = 'Enter your username and password.';
        errEl.style.display = 'block';
        return;
      }

      fetch(API + '/api/login/', {
        method:      'POST',
        credentials: 'include',
        headers:     { 'Content-Type': 'application/json' },
        body:        JSON.stringify({ username: username, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          errEl.textContent   = data.error;
          errEl.style.display = 'block';
          return;
        }
        var role = data.user ? data.user.role : '';
        if (role !== 'shop_owner') {
          /* Wrong role — show access denied */
          errEl.textContent   = 'Access denied. Shop owners only. Your role is: ' + (role || 'unknown') + '.';
          errEl.style.display = 'block';
          return;
        }
        /* Save role to localStorage so the navbar shows Shop Dashboard link */
        if (typeof DirkAuth !== 'undefined') {
          DirkAuth.login({ name: data.user.name || data.user.username, email: data.user.email || '', role: 'shop_owner' });
        }
        window.location.href = 'shop_dashboard.html';
      })
      .catch(function() {
        errEl.textContent   = 'Server is waking up — please refresh the page in a moment.';
        errEl.style.display = 'block';
      });
    }
  </script>
</body>
</html>
