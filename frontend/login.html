<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirkMhob - Professional Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f6f9;
            overflow: hidden;
        }

        .phone-frame {
            width: 100%;
            max-width: 412px;
            min-height: 100vh;
            position: relative;
            padding: 40px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0, 119, 200, 0.04), rgba(0, 119, 200, 0.04) 2px, transparent 2px, transparent 40px),
                repeating-linear-gradient(-45deg, rgba(0, 119, 200, 0.04), rgba(0, 119, 200, 0.04) 2px, #ffffff 2px, #ffffff 40px);
            overflow: hidden;
            border-radius: 32px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
        }

        .phone-frame::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,119,200,0.15) 0%, rgba(255,255,255,0) 70%);
            z-index: 1;
        }

        /* --- BRAND IDENTITY --- */
        .brand-container {
            text-align: center;
            margin-bottom: 30px;
            z-index: 2;
        }

        .logo-wrapper {
            background-color: #ffffff;
            padding: 12px 28px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 119, 200, 0.08);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            border: 1px solid rgba(0, 119, 200, 0.05);
        }

        .logo-img {
            height: 60px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .brand-name {
            font-size: 2.4rem;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -1px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 25px;
            letter-spacing: -0.3px;
            text-align: center;
            z-index: 2;
        }

        /* --- LOGIN CARD --- */
        .login-card {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            color: #0f172a;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Smooth premium input glow effect */
        .form-group input:focus {
            background-color: #ffffff;
            border-color: #0077c8;
            box-shadow: 0 0 0 4px rgba(0, 119, 200, 0.1);
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        /* --- OPTIONS ROW --- */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 0.8rem;
            gap: 1rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #64748b;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .forgot-password {
            margin-left: auto;
        }

        /* Professional checkbox switch design */
        .remember-me input {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            margin-right: 8px;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .remember-me input:checked {
            background-color: #0077c8;
            border-color: #0077c8;
        }

        .remember-me input:checked::before {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .forgot-password {
            color: #0077c8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            font-size: 0.8rem;
        }

        .forgot-password:hover {
            color: #005fa0;
        }

        /* --- BUTTONS & ACTIONS --- */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0077c8 0%, #005fa0 100%);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 119, 200, 0.25);
            margin-bottom: 22px;
            transition: all 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 119, 200, 0.35);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .signup-redirect {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
        }

        .signup-redirect a {
            color: #0077c8;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .signup-redirect a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        
        
        <div class="brand-container">
            <div class="logo-wrapper">
                <!-- Swapped out for your custom file image asset safely -->
                <img src="logo.png" alt="DirkMhob Logo" class="logo-img">
            </div>
            <h1 class="brand-name">DirkMhob</h1>
        </div>

        <h2 class="page-title">Welcome Back</h2>

        <!-- Login Form Card -->
    <div class="login-card">
        <!-- Removed action and post attributes to prevent native browser overrides -->
     <form onsubmit="return false;">
        
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox" id="remember">
                Remember me
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <!-- Changed type from "submit" to "button" to hand complete control to JS -->
        <button type="button" id="submit-login-btn" class="btn-login">Sign In</button>

        <div class="signup-redirect">
            Don't have an account? <a href="#" onclick="window.location.href='signup.html'">Sign up</a>
        </div>
    </form>
</div>

<script>
document.getElementById('submit-login-btn').addEventListener('click', async () => {
    const usernameInput = document.getElementById('username').value;
    const passwordInput = document.getElementById('password').value;
    const loginButton = document.getElementById('submit-login-btn');

    if (!usernameInput || !passwordInput) {
        alert('Please fill out all fields.');
        return;
    }

    loginButton.disabled = true;
    loginButton.innerText = "Signing in...";

    try {
        const response = await fetch('http://localhost:8000/api/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: usernameInput,
                password: passwordInput
            })
        });

        const data = await response.json();
        console.log("Server Response Data:", data); // Check this in console!

        if (response.ok && data.status === 'success') {
            console.log("Attempting redirection to home_screen.html now...");

            // Save the authentication state in the browser storage
            localStorage.setItem('isAdminLoggedIn', 'true');
            
            // Force redirection using different methods
            window.location.replace('home_screen.html'); 
        } else {
            alert('Login failed: ' + (data.message || 'Unknown error'));
        }

    } catch (error) {
        console.error('Network Error:', error);
        alert('Could not connect to the backend server.');
    } finally {
        loginButton.disabled = false;
        loginButton.innerText = "Sign In";
    }
});
</script>



</body>
</html>
