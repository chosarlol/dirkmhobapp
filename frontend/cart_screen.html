<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DirkMhob | Cart</title>
  <style>
    :root { --primary:#0077c8; --secondary:#ff6b35; --bg:#f8fafc; --surface:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; --success:#22c55e; }
    * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; }
    body { background:linear-gradient(135deg,#f8fbff 0%,#eef4ff 100%); color:var(--text); }
    a { color:inherit; text-decoration:none; }
    .site-header { position:sticky; top:0; z-index:20; background:rgba(248,250,252,0.95); backdrop-filter:blur(12px); border-bottom:1px solid rgba(226,232,240,0.8); }
    .container { width:min(1240px, calc(100% - 2rem)); margin:0 auto; }
    .navbar { display:flex; justify-content:space-between; align-items:center; padding:1rem 0; gap:1rem; }
    .brand { display:flex; align-items:center; gap:0.75rem; font-weight:800; font-size:1.1rem; }
    .brand-mark { width:42px; height:42px; display:inline-flex; align-items:center; justify-content:center; border-radius:14px; color:white; background:linear-gradient(135deg,var(--primary),var(--secondary)); box-shadow:0 10px 25px rgba(0,119,200,0.25); }
    .nav-links { display:flex; gap:1rem; color:var(--muted); font-weight:600; }
    .nav-links a:hover { color:var(--primary); }
    .nav-actions { display:flex; align-items:center; gap:0.75rem; }
    .search-pill { display:flex; align-items:center; gap:0.6rem; background:#fff; border:1px solid var(--border); border-radius:999px; padding:0.55rem 0.9rem; min-width:240px; cursor:text; }
    .search-pill input { border:none; outline:none; width:100%; background:transparent; color:var(--text); font:inherit; font-size:0.9rem; }
    .notification-btn { width:38px; height:38px; border-radius:50%; border:none; background:#fff; border:1px solid var(--border); cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
    @media(max-width:760px){ .search-pill{ display:none; } }
    .cart-page { display:grid; grid-template-columns:1.05fr 0.95fr; gap:1.2rem; padding:2rem 0 2.5rem; align-items:start; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:1.25rem; box-shadow:0 15px 35px rgba(15,23,42,0.06); }
    .panel-title { margin-bottom:0.4rem; }
    .panel-subtitle { color:var(--muted); font-size:0.92rem; margin-bottom:1rem; }
    .cart-item { display:flex; align-items:center; gap:1rem; padding:0.9rem 0; border-bottom:1px solid var(--border); transition:opacity 0.3s ease; }
    .cart-item:last-child { border-bottom:none; }
    .item-badge { width:56px; height:56px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-radius:16px; background:linear-gradient(135deg, rgba(0,119,200,0.12), rgba(255,107,53,0.12)); font-size:1.5rem; }
    .item-info { flex:1; min-width:0; }
    .item-info h4 { margin-bottom:0.2rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-info .res-name { color:var(--muted); font-size:0.85rem; }
    .qty { display:flex; align-items:center; gap:0.5rem; margin-top:0.45rem; }
    .qty-btn { width:28px; height:28px; border:1px solid var(--border); border-radius:50%; background:#f1f5f9; cursor:pointer; font-weight:700; font-size:1rem; transition:background 0.15s; }
    .qty-btn:hover { background:var(--primary); color:white; border-color:var(--primary); }
    .qty-count { min-width:20px; text-align:center; font-weight:700; }
    .item-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem; }
    .price { font-weight:800; white-space:nowrap; }
    .remove-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.1rem; padding:2px; transition:color 0.15s; }
    .remove-btn:hover { color:#ef4444; }
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .empty-state .empty-icon { font-size:3.5rem; margin-bottom:1rem; }
    .empty-state h3 { color:var(--text); margin-bottom:0.5rem; }
    .empty-state a { display:inline-block; margin-top:1.2rem; padding:0.8rem 1.5rem; background:var(--primary); color:white; border-radius:999px; font-weight:700; }
    .summary { display:grid; gap:1rem; position:sticky; top:90px; }
    .summary .row { display:flex; justify-content:space-between; color:var(--muted); font-size:0.95rem; }
    .summary .row.discount { color:var(--success); }
    .summary .total { font-size:1.1rem; font-weight:800; color:var(--text); border-top:2px solid var(--border); padding-top:0.75rem; margin-top:0.25rem; }
    .btn { display:inline-flex; align-items:center; justify-content:center; border:none; border-radius:999px; padding:0.9rem 1.1rem; cursor:pointer; font-weight:700; font-size:1rem; transition:all 0.2s; }
    .btn-primary { background:linear-gradient(135deg,var(--primary),#005fa0); color:white; box-shadow:0 12px 25px rgba(0,119,200,0.2); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 16px 30px rgba(0,119,200,0.3); }
    .btn-full { width:100%; }
    .promo { display:flex; gap:0.6rem; }
    .promo input { flex:1; border:1px solid var(--border); border-radius:999px; padding:0.8rem 1rem; outline:none; font-size:0.95rem; }
    .promo input:focus { border-color:var(--primary); }
    .badge-applied { background:#dcfce7; color:#16a34a; font-size:0.8rem; font-weight:700; padding:2px 8px; border-radius:999px; }
    @media (max-width:900px){ .cart-page{ grid-template-columns:1fr; } .summary{ position:static; } }
    @media (max-width:620px){ .nav-links{ display:none; } }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="home_screen.html"><img src="logo.png" alt="DirkMhob" style="height:44px;width:auto;vertical-align:middle;"></a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="home_screen.html">Home</a>
        <a href="search_screen.html">Restaurants</a>
        <a href="asian_dish.html">Categories</a>
        <a href="home_screen.html#promotions">Promotions</a>
        <a href="home_screen.html#about">About Us</a>
        <a href="home_screen.html#contact">Contact</a>
      </nav>
      <div class="nav-actions">
        <label class="search-pill"><span>🔎</span><input type="text" placeholder="Search restaurants, food, cuisines..."></label>
        <button class="notification-btn" aria-label="Notifications">🔔</button>
        <span id="nav-auth"></span>
      </div>
    </div>
  </header>

  <main class="container cart-page">
    <section class="panel">
      <h2 class="panel-title">Your cart</h2>
      <p class="panel-subtitle" id="cart-subtitle">Loading…</p>
      <div id="cart-items-list"></div>
    </section>

    <aside class="panel summary">
      <h3>Order summary</h3>
      <div class="row"><span>Subtotal</span><span id="sum-subtotal">$0.00</span></div>
      <div class="row"><span>Delivery fee</span><span id="sum-delivery">$0.00</span></div>
      <div class="row"><span>Service fee</span><span id="sum-service">$0.00</span></div>
      <div class="row discount" id="discount-row"><span id="discount-row-label">Discount</span><span id="sum-discount">−$0.00</span></div>
      <div class="row total"><span>Total</span><span id="sum-total">$0.00</span></div>
      <div class="promo">
        <input type="text" placeholder="Promo code" id="promo-input" />
        <button class="btn btn-primary" onclick="applyPromo()">Apply</button>
      </div>
      <a class="btn btn-primary btn-full" href="check_out.html" id="checkout-btn">Checkout</a>
    </aside>
  </main>

  <script src="cart.js"></script>
  <script src="promo.js"></script>
  <script src="auth.js"></script>
  <script>
    function renderCart() {
      var cart     = DirkCart.getCart();
      var listEl   = document.getElementById('cart-items-list');
      var subtitle = document.getElementById('cart-subtitle');
      var checkBtn = document.getElementById('checkout-btn');

      if (!cart.length) {
        subtitle.textContent = '';
        listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><h3>Your cart is empty</h3><p>Add some delicious items from our restaurants.</p><a href="home_screen.html">Browse restaurants</a></div>';
        checkBtn.style.pointerEvents = 'none';
        checkBtn.style.opacity = '0.5';
        updateSummary([]);
        return;
      }

      var totalItems = cart.reduce(function(s, i) { return s + i.quantity; }, 0);
      subtitle.textContent = totalItems + ' item' + (totalItems !== 1 ? 's' : '') + ' in your cart';
      checkBtn.style.pointerEvents = '';
      checkBtn.style.opacity = '';

      listEl.innerHTML = cart.map(function(item, idx) {
        return '<div class="cart-item" id="cart-row-' + idx + '">' +
          '<div class="item-badge">' + (item.emoji || '🍽️') + '</div>' +
          '<div class="item-info">' +
            '<h4>' + item.name + '</h4>' +
            '<div class="res-name">' + item.restaurantName + '</div>' +
            '<div class="qty">' +
              '<button class="qty-btn" onclick="changeQty(' + idx + ', -1)">−</button>' +
              '<span class="qty-count" id="qty-' + idx + '">' + item.quantity + '</span>' +
              '<button class="qty-btn" onclick="changeQty(' + idx + ', 1)">+</button>' +
            '</div>' +
          '</div>' +
          '<div class="item-right">' +
            '<span class="price">$' + (item.price * item.quantity).toFixed(2) + '</span>' +
            '<button class="remove-btn" onclick="removeItem(' + idx + ')" title="Remove">✕</button>' +
          '</div>' +
        '</div>';
      }).join('');

      updateSummary(cart);
    }

    function updateSummary(cart) {
      var subtotal   = DirkCart.calculateSubtotal(cart);
      var promoCalc  = cart.length
        ? DirkPromo.calculateDiscount(subtotal, DirkCart.DELIVERY_FEE)
        : { discount: 0, delivery: 0, label: null, promoCode: null };
      var delivery   = cart.length ? promoCalc.delivery : 0;
      var discount   = cart.length ? promoCalc.discount  : 0;
      var serviceFee = cart.length ? 1.00 : 0;
      var total      = subtotal + delivery + serviceFee - discount;

      document.getElementById('sum-subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('sum-delivery').textContent = '$' + delivery.toFixed(2);
      document.getElementById('sum-service').textContent  = '$' + serviceFee.toFixed(2);
      document.getElementById('sum-discount').textContent = '−$' + discount.toFixed(2);
      document.getElementById('sum-total').textContent    = '$' + total.toFixed(2);

      /* Update discount label to reflect which promo is active */
      var labelEl = document.getElementById('discount-row-label');
      if (labelEl) {
        var activePromo = DirkPromo.getActivePromo();
        if (activePromo && (discount > 0 || activePromo.type === 'FREE_DELIVERY')) {
          labelEl.innerHTML = escHtml(activePromo.label) + ' <span class="badge-applied">APPLIED</span>';
        } else {
          labelEl.innerHTML = 'Discount';
        }
      }
      console.log('[CART] updateSummary subtotal=$' + subtotal.toFixed(2) +
                  ' delivery=$' + delivery.toFixed(2) +
                  ' discount=$' + discount.toFixed(2) +
                  ' total=$' + total.toFixed(2) +
                  ' promo=' + (promoCalc.promoCode || 'none'));
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function changeQty(idx, delta) {
      var cart = DirkCart.getCart();
      var item = cart[idx];
      if (!item) return;
      var newQty = item.quantity + delta;
      if (newQty <= 0) {
        removeItem(idx);
        return;
      }
      DirkCart.updateQuantity(item.restaurantId, item.name, newQty);
      document.getElementById('qty-' + idx).textContent = newQty;
      var priceEl = document.getElementById('cart-row-' + idx).querySelector('.price');
      priceEl.textContent = '$' + (item.price * newQty).toFixed(2);
      updateSummary(DirkCart.getCart());
    }

    function removeItem(idx) {
      var cart = DirkCart.getCart();
      var item = cart[idx];
      if (!item) return;
      var row = document.getElementById('cart-row-' + idx);
      if (row) { row.style.opacity = '0'; }
      setTimeout(function() {
        DirkCart.removeFromCart(item.restaurantId, item.name);
        renderCart();
      }, 300);
    }

    function applyPromo() {
      var code = document.getElementById('promo-input').value.trim();
      if (!code) return;
      var result = DirkPromo.applyByCode(code);
      console.log('[CART] applyPromo result:', result);
      if (result.success) {
        document.getElementById('promo-input').value = '';
        renderCart(); /* re-render with new promo applied */
        showCartToast('✓ ' + result.message, '#16a34a');
      } else {
        showCartToast('✗ ' + result.message, '#ef4444');
      }
    }

    function showCartToast(msg, bg) {
      var t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:28px;right:28px;padding:13px 22px;border-radius:12px;' +
                        'font-weight:700;font-size:0.88rem;z-index:9999;color:#fff;' +
                        'box-shadow:0 8px 28px rgba(0,0,0,0.16);transition:opacity 0.35s;background:' + bg + ';';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 350); }, 2800);
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
