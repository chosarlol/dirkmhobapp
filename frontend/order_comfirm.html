<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking Status</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            background-color: #fcfcfc;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* Close Button Header */
        .header-bar {
            padding: 20px 24px;
            display: flex;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            font-weight: 300;
            cursor: pointer;
            color: #000;
        }

        /* Content Scroll Wrapper */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
        }

        /* Top Title Text */
        .status-heading {
            font-size: 20px;
            font-weight: 700;
            color: #000;
            margin-bottom: 24px;
        }

        /* Main Order Card */
        .order-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f4;
            margin-bottom: 16px;
        }

        .restaurant-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .brand-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 44px;
            height: 44px;
            background-color: #e51b24;
            color: white;
            font-weight: 900;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            text-align: center;
            line-height: 1.1;
        }

        .restaurant-name {
            font-size: 15px;
            font-weight: 700;
            color: #000;
        }

        .status-badge {
            color: #008be3;
            font-size: 13px;
            font-weight: 600;
        }

        .arrival-label {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 4px;
        }

        .arrival-content-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-counter {
            font-size: 22px;
            font-weight: 700;
            color: #000;
        }

        /* Mock Thumbnails for Food Items */
        .food-thumbnails {
            display: flex;
            gap: 6px;
        }

        .thumb-box {
            width: 44px;
            height: 34px;
            background-color: #f2f2f7;
            border-radius: 6px;
            border: 1px solid #e5e5ea;
        }

        /* Notification Alert Banner */
        .alert-banner {
            background-color: #e1f0ff;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .check-icon-box {
            width: 18px;
            height: 18px;
            background-color: #34c759;
            color: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .alert-text {
            font-size: 14px;
            color: #0056b3;
            line-height: 1.4;
            font-weight: 500;
        }

        /* Marketing Banner Card */
        .promo-card {
            background-color: #e1f0ff;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            min-height: 130px;
        }

        .promo-title {
            font-size: 16px;
            font-weight: 700;
            color: #000;
            margin-bottom: 6px;
        }

        .promo-desc {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 24px;
            max-width: 60%;
        }

        .promo-link {
            font-size: 13px;
            font-weight: 700;
            color: #000;
            text-decoration: none;
            display: block;
        }

        /* CSS Illustration replacing delivery scooter graphic */
        .scooter-graphic {
            position: absolute;
            right: 16px;
            bottom: 16px;
            width: 90px;
            height: 70px;
            background: linear-gradient(135deg, #008be3, #58a6ff);
            border-radius: 50% 50% 40% 40%;
            opacity: 0.85;
        }
        .scooter-graphic::after {
            content: '🛵';
            font-size: 40px;
            position: absolute;
            top: 10px;
            left: 20px;
        }

        /* Bottom Fixed Navigation Block */
        .bottom-sticky-bar {
            padding: 20px 24px;
            border-top: 1px solid #f2f2f7;
            background-color: white;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .home-icon-container {
            width: 44px;
            height: 44px;
            background-color: #f2f2f7;
            color: #008be3;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .destination-details {
            display: flex;
            flex-direction: column;
        }

        .delivery-to-label {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 2px;
        }

        .address-eta-text {
            font-size: 14px;
            font-weight: 700;
            color: #000;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Close Screen Handle -->
    <header class="header-bar">
        <button class="close-btn" onclick="window.location.href='cart_screen.html'">&#10005;</button>
    </header>

    <main class="content">
        <h2 class="status-heading">Hang in there, we're on it!</h2>

        <!-- Order Information block -->
        <div class="order-card">
            <div class="restaurant-row">
                <div class="brand-block">
                    <div class="logo-box">KFC</div>
                    <span class="restaurant-name">KFC - TK Avenue</span>
                </div>
                <span class="status-badge">Preparing Order</span>
            </div>

            <div class="arrival-label">Estimated arrival</div>
            <div class="arrival-content-flex">
                <div class="time-counter">25-30 minutes</div>
                <div class="food-thumbnails">
                    <div class="thumb-box"></div>
                    <div class="thumb-box"></div>
                </div>
            </div>
        </div>

        <!-- Alert Notification bar -->
        <div class="alert-banner">
            <div class="check-icon-box">&#10003;</div>
            <p class="alert-text">Order confirmed! KFC is currently preparing your order.</p>
        </div>

        <!-- Promotional Reward Block -->
        <div class="promo-card">
            <h3 class="promo-title">Unlock Free Delivery!</h3>
            <p class="promo-desc">Get more exclusive deals and discount</p>
            <a href="#" class="promo-link">Explore now</a>
            <div class="scooter-graphic"></div>
        </div>
    </main>

    <!-- Bottom Delivery Target Address Strip -->
    <footer class="bottom-sticky-bar">
        <div class="home-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div>
        <div class="destination-details">
            <span class="delivery-to-label">Delivery to</span>
            <p class="address-eta-text">Portola Drive, Expected in 25 mins</p>
        </div>
    </footer>
</div>

</body>
</html>
